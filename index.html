<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily AI Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --a-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang TC", "Noto Sans TC", sans-serif;
    --a-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "PingFang TC", "Noto Sans TC", sans-serif;
    --a-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    background: #f5f5f7;
    font-family: var(--a-sans);
    color: #1d1d1f;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  button, input { font-family: inherit; }
  pre { white-space: pre; }
  @media (prefers-color-scheme: dark) {
    body {
      background: #0a0a0c;
      color: rgba(255,255,255,0.92);
    }
  }

  #digest-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #050506;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    color: rgba(255,255,255,0.9);
    transition: opacity 400ms;
  }
  #digest-overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #ff6b35; border-right-color: #ff2d92;
    border-bottom-color: #8b5cf6; border-left-color: #2a9df4;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-text { font-size: 15px; font-weight: 600; }
  .overlay-sub { font-size: 12px; color: rgba(255,255,255,0.52); }
  .overlay-error {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    max-width: 360px; text-align: center;
  }
  .overlay-error h2 { margin: 0; font-size: 18px; font-weight: 700; }
  .overlay-error p { margin: 0; font-size: 13px; color: rgba(255,255,255,0.62); line-height: 1.55; }
  .overlay-btn {
    padding: 8px 20px; border-radius: 999px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 700;
  }
  .overlay-btn.primary { background: white; color: black; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<script src="src/github-api.js"></script>
<script type="text/babel" src="src/v1-magazine.jsx"></script>
</head>
<body>

<div id="digest-overlay">
  <div class="overlay-ring"></div>
  <div class="overlay-text">正在載入 GitHub 精選...</div>
  <div class="overlay-sub">優先讀取 NeonDB，必要時使用 GitHub fallback</div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useCallback, useEffect, useState } = React;

const TOKEN_KEY = "digest-gh-token";

function showOverlay(html) {
  const el = document.getElementById("digest-overlay");
  el.innerHTML = html;
  el.style.display = "flex";
  el.classList.remove("hidden");
}

function hideOverlay() {
  const el = document.getElementById("digest-overlay");
  el.classList.add("hidden");
  setTimeout(() => { el.style.display = "none"; }, 450);
}

function App() {
  const [digest, setDigest] = useState(null);
  const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY) || "");
  const [status, setStatus] = useState("loading");
  const [editions, setEditions] = useState([]);
  const [selectedDate, setSelectedDate] = useState(null);

  const load = useCallback(async (tok, date) => {
    setStatus("loading");
    showOverlay(`
      <div class="overlay-ring"></div>
      <div class="overlay-text">正在載入 GitHub 精選...</div>
      <div class="overlay-sub">優先讀取 NeonDB，必要時使用 GitHub fallback</div>
    `);

    try {
      if (typeof window.loadDigestData !== "function") {
        throw new Error("src/github-api.js did not load.");
      }
      if (typeof window.DigestApp !== "function") {
        throw new Error("src/v1-magazine.jsx did not load.");
      }

      const { data, source, total } = await window.loadDigestData(tok || null, date || null);
      setDigest(data);
      setStatus("ok");
      hideOverlay();

      if (source === "cache") console.log("[digest] loaded from cache");
      else if (source === "database") console.log("[digest] loaded from database");
      else if (source === "fallback") console.log("[digest] loaded fallback preview data");
      else console.log("[digest] fetched from GitHub (" + (total || 0).toLocaleString() + " results)");
    } catch (err) {
      if (err.message === "rate_limit") {
        const reset = err.reset ? new Date(err.reset * 1000).toLocaleTimeString() : "稍後";
        setStatus("rate_limit");
        showOverlay(`
          <div class="overlay-error">
            <h2>GitHub API 速率限制</h2>
            <p>目前瀏覽器端 GitHub 查詢已達限制，請於 ${reset} 後重試，或先確認 Render 的 DATABASE_URL 是否已設定。</p>
            <button class="overlay-btn primary" onclick="window.__retry()">重試</button>
          </div>
        `);
      } else {
        setStatus("error");
        showOverlay(`
          <div class="overlay-error">
            <h2>無法載入精選資料</h2>
            <p>${err.message}</p>
            <button class="overlay-btn primary" onclick="window.__retry()">重試</button>
          </div>
        `);
      }
    }
  }, []);

  useEffect(() => {
    window.__retry = () => load(localStorage.getItem(TOKEN_KEY) || "", selectedDate);
  }, [load, selectedDate]);

  useEffect(() => {
    load(token, null);
    if (typeof window.loadEditions === "function") {
      window.loadEditions().then(setEditions).catch(() => {});
    }
  }, []);

  const saveToken = (value) => {
    const trimmed = value.trim();
    setToken(trimmed);
    if (trimmed) localStorage.setItem(TOKEN_KEY, trimmed);
    else localStorage.removeItem(TOKEN_KEY);
  };

  const handleSelectDate = (date) => {
    setSelectedDate(date);
    load(localStorage.getItem(TOKEN_KEY) || "", date);
  };

  return (
    <DigestApp
      data={digest}
      status={status}
      token={token}
      onTokenChange={saveToken}
      onRefresh={() => load(localStorage.getItem(TOKEN_KEY) || "", selectedDate)}
      onClearCache={() => {
        window.clearDigestCache();
        load(localStorage.getItem(TOKEN_KEY) || "", null);
      }}
      editions={editions}
      selectedDate={selectedDate}
      onSelectDate={handleSelectDate}
    />
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
