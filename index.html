<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Daily AI Digest · 每日 AI 開源精選</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --a-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", "PingFang TC", "Noto Sans TC", sans-serif;
    --a-display: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Inter", "PingFang TC", "Noto Sans TC", sans-serif;
    --a-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  html, body, #root { height: 100%; margin: 0; padding: 0; }
  body {
    background: #000;
    font-family: var(--a-sans);
    color: #1d1d1f;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  * { box-sizing: border-box; }
  button, input { font-family: inherit; }
  pre { white-space: pre; }

  /* Loading / error overlay */
  #digest-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: #000;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 18px;
    font-family: -apple-system, BlinkMacSystemFont, "Inter", sans-serif;
    color: rgba(255,255,255,0.9);
    transition: opacity 400ms;
  }
  #digest-overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay-ring {
    width: 56px; height: 56px; border-radius: 50%;
    border: 2px solid transparent;
    border-top-color: #ff6b35; border-right-color: #ff2d92;
    border-bottom-color: #8b5cf6; border-left-color: #2a9df4;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .overlay-text { font-size: 15px; font-weight: 500; letter-spacing: -0.1px; }
  .overlay-sub  { font-size: 12px; color: rgba(255,255,255,0.45); }
  .overlay-error {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    max-width: 340px; text-align: center;
  }
  .overlay-error h2 { margin: 0; font-size: 18px; font-weight: 600; }
  .overlay-error p  { margin: 0; font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.55; }
  .overlay-btn {
    padding: 8px 20px; border-radius: 999px; border: none; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
  }
  .overlay-btn.primary { background: white; color: black; }
  .overlay-btn.ghost   { background: rgba(255,255,255,0.10); color: white; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script src="src/github-api.js"></script>
<script type="text/babel" src="src/v1-magazine.jsx"></script>
</head>
<body>

<div id="digest-overlay">
  <div class="overlay-ring"></div>
  <div class="overlay-text">正在從 GitHub 抓取今日精選…</div>
  <div class="overlay-sub">每 30 分鐘快取一次</div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const TOKEN_KEY = "digest-gh-token";

function showOverlay(html) {
  const el = document.getElementById("digest-overlay");
  el.innerHTML = html;
  el.classList.remove("hidden");
}
function hideOverlay() {
  const el = document.getElementById("digest-overlay");
  el.classList.add("hidden");
  setTimeout(() => { el.style.display = "none"; }, 450);
}

function App() {
  const [digest, setDigest] = useState(null);
  const [token,  setToken]  = useState(() => localStorage.getItem(TOKEN_KEY) || "");
  const [status, setStatus] = useState("loading");

  const load = useCallback(async (tok) => {
    setStatus("loading");
    showOverlay(`
      <div class="overlay-ring"></div>
      <div class="overlay-text">正在從 GitHub 抓取今日精選…</div>
      <div class="overlay-sub">每 30 分鐘快取一次</div>
    `);
    try {
      const { data, source, total } = await window.loadDigestData(tok || null);
      setDigest(data);
      setStatus("ok");
      hideOverlay();
      if (source === "cache") console.log("[digest] loaded from cache");
      else console.log("[digest] fetched from GitHub (" + (total || 0).toLocaleString() + " results)");
    } catch (err) {
      if (err.message === "rate_limit") {
        const reset = err.reset ? new Date(err.reset * 1000).toLocaleTimeString() : "稍後";
        setStatus("rate_limit");
        showOverlay(`
          <div class="overlay-error">
            <h2>⏱ GitHub 速率限制</h2>
            <p>未授權請求每小時限制 10 次搜尋。重置時間：${reset}。<br>
               點 ⚙ 設定 GitHub Token 可提升到每小時 30 次。</p>
            <button class="overlay-btn primary" onclick="window.__useMock()">先用示範資料</button>
          </div>
        `);
      } else {
        setStatus("error");
        showOverlay(`
          <div class="overlay-error">
            <h2>無法取得資料</h2>
            <p>${err.message}</p>
            <button class="overlay-btn primary" onclick="window.__retry()">重試</button>
            <button class="overlay-btn ghost"   onclick="window.__useMock()">先用示範資料</button>
          </div>
        `);
      }
    }
  }, []);

  useEffect(() => {
    window.__retry   = () => load(localStorage.getItem(TOKEN_KEY) || "");
    window.__useMock = () => { setDigest(window.DIGEST_DATA); setStatus("ok"); hideOverlay(); };
  }, [load]);

  useEffect(() => { load(token); }, []);

  const saveToken = (t) => {
    const trimmed = t.trim();
    setToken(trimmed);
    if (trimmed) localStorage.setItem(TOKEN_KEY, trimmed);
    else         localStorage.removeItem(TOKEN_KEY);
  };

  const data = digest || window.DIGEST_DATA;

  return (
    <DigestApp
      data={data}
      status={status}
      token={token}
      onTokenChange={saveToken}
      onRefresh={() => load(localStorage.getItem(TOKEN_KEY) || "")}
      onClearCache={() => window.clearDigestCache()}
    />
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
